// ---------- Changelog / What's New bento card ----------
const ChangelogCard = ({ mods, targetVersion, isAdmin, checkAllUpdates, checkingUpdates }) => {
  const [expanded, setExpanded] = useState(null);

  const updatable = useMemo(() => mods.filter(m =>
    !m.isCustom &&
    m.target_version_number && m.target_version_number !== 'None Found' &&
    m.target_version_number !== m.installed_version &&
    m.target_changelog
  ), [mods]);

  const firstLine = (text) => (text || '').split('\n').find(l => l.trim()) || '';
  const cleanLine = (text) => text.replace(/^#+\s*/, '').replace(/\*\*/g, '').replace(/`/g, '').trim();

  return (
    <Glass style={{ padding: 22, borderRadius: 'var(--r-xl)', display: 'flex', flexDirection: 'column', gap: 12 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 400, color: 'var(--text-dim)', letterSpacing: '-0.015em', flex: 1 }}>
          What's New
        </div>
        {updatable.length > 0 && (
          <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 99, background: 'color-mix(in oklab, var(--acc-1) 18%, transparent)', color: 'var(--acc-1)', border: '1px solid color-mix(in oklab, var(--acc-1) 35%, transparent)' }}>
            {updatable.length} update{updatable.length !== 1 ? 's' : ''} → {targetVersion}
          </span>
        )}
      </div>

      {updatable.length === 0 ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        <p style={{ margin: 0, fontSize: 13, color: 'var(--text-ghost)', fontStyle: 'italic' }}>
          All changelogs up to date for {targetVersion}.{!isAdmin ? ' Ask an admin to run Refresh mod builds.' : ''}
        </p>
        {isAdmin && (
          <button onClick={() => checkAllUpdates()} disabled={checkingUpdates}
            style={{ alignSelf: 'flex-start', background: 'rgba(255,255,255,0.07)', border: '1px solid var(--glass-border)', borderRadius: 10, color: 'var(--text-dim)', fontFamily: 'var(--font)', fontSize: 12.5, fontWeight: 600, cursor: checkingUpdates ? 'not-allowed' : 'pointer', padding: '7px 14px', display: 'flex', alignItems: 'center', gap: 7, transition: 'all .15s', opacity: checkingUpdates ? 0.5 : 1 }}>
            <Icon name="arrows-rotate" className={checkingUpdates ? 'spin' : ''} style={{ fontSize: 11 }} />
            {checkingUpdates ? 'Checking...' : 'Refresh mod builds'}
          </button>
        )}
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6, overflowY: 'auto', maxHeight: 120 }}>
          {updatable.map(mod => (
            <div key={mod.id}
              onClick={() => setExpanded(expanded === mod.id ? null : mod.id)}
              style={{ cursor: 'pointer', padding: '9px 11px', borderRadius: 11, background: 'rgba(255,255,255,0.04)', border: '1px solid var(--glass-border)', transition: 'background .15s' }}
              onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.07)'}
              onMouseLeave={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                {mod.icon_url
                  ? <img src={mod.icon_url} alt="" style={{ width: 20, height: 20, borderRadius: 5, flexShrink: 0 }} />
                  : <Icon name="cube" style={{ fontSize: 12, color: 'var(--text-faint)', flexShrink: 0 }} />}
                <span style={{ flex: 1, fontSize: 13, fontWeight: 620, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{mod.title}</span>
                <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--acc-1)', flexShrink: 0 }}>{mod.target_version_number}</span>
                <Icon name={expanded === mod.id ? 'chevron-up' : 'chevron-down'} style={{ fontSize: 10, color: 'var(--text-faint)', flexShrink: 0 }} />
              </div>
              {expanded !== mod.id && (
                <p style={{ margin: '5px 0 0 28px', fontSize: 12, color: 'var(--text-faint)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                  {cleanLine(firstLine(mod.target_changelog))}
                </p>
              )}
              {expanded === mod.id && (
                <pre style={{ margin: '8px 0 0', fontSize: 12, color: 'var(--text-faint)', whiteSpace: 'pre-wrap', wordBreak: 'break-word', lineHeight: 1.55, fontFamily: 'var(--font)', maxHeight: 140, overflowY: 'auto', padding: '8px 10px', background: 'rgba(0,0,0,0.2)', borderRadius: 8 }}>
                  {mod.target_changelog.length > 800 ? mod.target_changelog.slice(0, 800) + '\n...' : mod.target_changelog}
                </pre>
              )}
            </div>
          ))}
        </div>
      )}
    </Glass>
  );

  }, [showDropdown]);

  // ---- list compute ----
  const baseList = activeTab === 'active' ? mods : wishlist;
  const isLibraryMod = (m) => activeDependencyIds.has(m.id) || (m.categories || []).includes('library');
  const libraryCount = activeTab === 'active' ? mods.filter(isLibraryMod).length : 0;

  const visible = useMemo(() => {
    let list = [...baseList];
    if (activeTab === 'active' && !showLibraries && !filterQuery.trim() && filter !== 'library') list = list.filter(m => !isLibraryMod(m));
    // Status filter
    if (filter === 'custom') list = list.filter(m => m.isCustom);
    if (filter === 'missing') list = list.filter(m => !m.isCustom && m.target_version_number === 'None Found');
    if (filter === 'not-installed') list = list.filter(m => vmDiskFiles !== null && !vmDiskFiles.some(f => f.startsWith(m.slug + '-') || f === m.slug + '.jar'));
    if (filter === 'server-only') list = list.filter(m => m.server_side === 'required' && m.client_side === 'unsupported');
    if (filter === 'library') list = list.filter(m => isLibraryMod(m));
    if (filterQuery.trim()) {
      const q = filterQuery.toLowerCase();
      list = list.filter(m => m.title.toLowerCase().includes(q) || (m.description || '').toLowerCase().includes(q));
    }
    list.sort((a, b) => {
      if (sortBy === 'name') return a.title.localeCompare(b.title);
      if (sortBy === 'nameDesc') return b.title.localeCompare(a.title);
      if (sortBy === 'status') return (a.status === 'ready' ? 0 : 1) - (b.status === 'ready' ? 0 : 1);
      if (sortBy === 'votes') return ((b.upvotes || []).length - (b.downvotes || []).length) - ((a.upvotes || []).length - (a.downvotes || []).length);
      if (sortBy === 'recent') return baseList.indexOf(b) - baseList.indexOf(a);
      if (sortBy === 'oldest') return baseList.indexOf(a) - baseList.indexOf(b);

          status: latestTv ? 'ready' : 'missing',

            ]} />
          <div style={{ flex: 1 }} />

          {/* search within */}
          <div style={{ position: 'relative', width: 200 }} className="hide-sm">
            <Icon name="magnifying-glass" style={{ position: 'absolute', left: 12, top: 11, fontSize: 12, color: 'var(--text-faint)' }} />
            <input className="field" value={filterQuery} onChange={e => setFilterQuery(e.target.value)} placeholder="Filter..." style={{ padding: '9px 12px 9px 32px', fontSize: 13 }} />
          </div>
          <div style={{ width: 130 }} className="hide-sm">
            <Select value={sortBy} onChange={e => setSortBy(e.target.value)}>
              <option value="name">Sort: A-Z</option>
              <option value="nameDesc">Sort: Z-A</option>
              <option value="recent">Sort: Newest</option>
              <option value="oldest">Sort: Oldest</option>
              {activeTab === 'wishlist' && <option value="votes">Sort: Votes</option>}
            </Select>
          </div>

          {activeTab === 'active' && (
            <button onClick={() => setShowMigrationModal(true)}
              style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 16px', borderRadius: 12, border: 0, cursor: 'pointer', fontSize: 13.5, fontWeight: 620, fontFamily: 'var(--font)', transition: 'all .15s',
                background: isSyncMismatch ? 'color-mix(in oklab, var(--acc-1) 16%, transparent)' : 'rgba(255,255,255,0.07)',
                color: isSyncMismatch ? 'var(--acc-1)' : 'var(--text-dim)',
                outline: isSyncMismatch ? '1px solid color-mix(in oklab, var(--acc-1) 35%, transparent)' : '1px solid var(--glass-border)',
              }}>
              <Icon name="arrow-up-right-dots" style={{ fontSize: 12 }} />
              <span>Migration</span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, opacity: 0.7 }}>{readyCount}/{realMods.length}</span>
              {isSyncMismatch && <span style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--acc-1)', animation: 'pulse 1.5s infinite' }} />}
            </button>
          )}
          {/* overflow */}
          <div style={{ position: 'relative' }} ref={actionsRef}>
            <IconBtn name="ellipsis" title="More" active={showActionsMenu} onClick={() => setShowActionsMenu(v => !v)} />
            {showActionsMenu && (
              <div className="fade-in" style={{ position: 'absolute', right: 0, top: 46, width: 240, padding: 7, zIndex: 50, borderRadius: 18, background: 'rgba(12,18,38,0.99)', border: '1px solid rgba(255,255,255,0.14)' }}>
                {[
                  // Group 1: add / script
                  [
                    { icon: 'terminal', label: 'Get migration script', on: () => setShowScriptModal(true) },
                    isAdmin && { icon: 'file-arrow-up', label: 'Add custom mod', on: () => setShowCustomModal(true) },
                  ].filter(Boolean),
                  // Group 2: VM / sync
                  [
                    isAdmin && vmApiUrl && { icon: 'hard-drive', label: 'VM sync', on: handleVmSync },
                    isAdmin && vmApiUrl && { icon: 'rotate', label: 'Sync versions from disk', on: handleSyncVersionsFromDisk },
                    isAdmin && vmApiUrl && { icon: 'wrench', label: 'Fix jar filenames', on: handleBatchReinstall },
                    isAdmin && { icon: 'tags', label: 'Sync tags from Modrinth', on: handleSyncTagsFromModrinth },
                  ].filter(Boolean),
                  // Group 3: view toggles
                  [
                    activeTab === 'active' && { icon: showUpgradePanel ? 'eye-slash' : 'diagram-project', label: showUpgradePanel ? 'Hide dependency tree' : 'Show dependency tree', on: () => setShowUpgradePanel(v => !v) },
                    activeTab === 'active' && libraryCount > 0 && { icon: showLibraries ? 'eye-slash' : 'layer-group', label: `${showLibraries ? 'Hide' : 'Show'} ${libraryCount} ${libraryCount === 1 ? 'library mod' : 'library mods'}`, on: () => setShowLibraries(v => !v) },
                  ].filter(Boolean),
                  // Group 4: backup
                  [
                    { icon: 'download', label: 'Export backup', on: handleExportBackup },
                    isAdmin && { icon: 'upload', label: 'Import backup', on: triggerImport },
                  ].filter(Boolean),
                ].filter(g => g.length > 0).map((group, gi, arr) => (
                  <React.Fragment key={gi}>
                    {gi > 0 && <div style={{ height: 1, background: 'var(--glass-border)', margin: '5px 8px', opacity: 0.7 }} />}
                    {group.map((a, i) => (
                      <button key={i} onClick={() => { a.on(); setShowActionsMenu(false); }}
                        style={{ display: 'flex', alignItems: 'center', gap: 11, width: '100%', padding: '10px 11px', background: 'transparent', border: 0, borderRadius: 10, color: 'var(--text-dim)', fontSize: 13.5, fontWeight: 540, cursor: 'pointer', textAlign: 'left', fontFamily: 'var(--font)', transition: 'all .15s' }}
                        onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.07)'; e.currentTarget.style.color = 'var(--text)'; }}
                        onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-dim)'; }}>
                        <Icon name={a.icon} style={{ fontSize: 13, width: 16, textAlign: 'center' }} /> {a.label}
                      </button>
                    ))}
                  </React.Fragment>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* ===== Add Mod - always visible pinned search bar ===== */}
        {(isAdmin || activeTab === 'wishlist') && (
          <div style={{ position: 'relative' }}>
            <div style={{ display: 'flex', gap: 9, alignItems: 'center' }}>
              <div style={{ position: 'relative', flex: 1 }} ref={searchRef}>
                <Icon name="magnifying-glass" style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', fontSize: 15, color: 'var(--text-faint)', pointerEvents: 'none' }} />
                <input className="field" value={modInput} onChange={e => { setModInput(e.target.value); setError(null); }}
                  onKeyDown={e => { if (e.key === 'Enter') handleAddMod(e); }}
                  placeholder={`Search Modrinth to add a mod...`}
                  style={{ padding: '13px 16px 13px 42px', fontSize: 15, borderRadius: 14 }} />
                {showDropdown && searchResults.length > 0 && (
                  <Glass strong style={{ position: 'absolute', top: 'calc(100% + 8px)', left: 0, right: 0, zIndex: 30, padding: 8, borderRadius: 18, maxHeight: 400, overflowY: 'auto' }}>
                    {searchResults.map((hit, idx) => (
                      <button key={hit.project_id} onClick={() => handleSelectSearchResult(hit)}
                        style={{ display: 'flex', alignItems: 'center', gap: 14, width: '100%', padding: '12px 14px', background: 'transparent', border: 0, borderRadius: 13, cursor: 'pointer', textAlign: 'left', transition: 'background .15s', borderBottom: idx < searchResults.length - 1 ? '1px solid rgba(255,255,255,0.06)' : 'none' }}
                        onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.07)'}
                        onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                        {hit.icon_url
                          ? <img src={hit.icon_url} alt="" style={{ width: 48, height: 48, borderRadius: 13, objectFit: 'cover', flexShrink: 0, boxShadow: '0 3px 10px rgba(0,0,0,0.45)' }} />
                          : <div style={{ width: 48, height: 48, borderRadius: 13, background: 'rgba(0,0,0,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="cube" style={{ color: 'var(--text-faint)', fontSize: 20 }} /></div>}
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontFamily: 'var(--font)', fontSize: 15, fontWeight: 640, color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', letterSpacing: '-0.015em', lineHeight: 1.2 }}>{hit.title}</div>
                          <div style={{ fontSize: 12.5, color: 'var(--text-faint)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginTop: 3 }}>{hit.description}</div>
                          {hit.categories && hit.categories.length > 0 && (
                            <div style={{ display: 'flex', gap: 4, marginTop: 6, flexWrap: 'nowrap', overflow: 'hidden' }}>
                              {hit.categories.filter(c => !['fabric','forge','quilt','neoforge','liteloader'].includes(c)).slice(0, 3).map(cat => (
                                <span key={cat} style={{ fontSize: 10, fontWeight: 660, letterSpacing: '.04em', textTransform: 'capitalize', padding: '2px 7px', borderRadius: 99, background: 'rgba(255,255,255,0.08)', color: 'var(--text-faint)', border: '1px solid rgba(255,255,255,0.1)', whiteSpace: 'nowrap' }}>{cat}</span>
                              ))}
                            </div>
                          )}
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 }}>
                          <span style={{ fontSize: 12, color: 'var(--text-ghost)', display: 'flex', alignItems: 'center', gap: 4 }}>
                            <Icon name="download" style={{ fontSize: 10 }} />{(hit.downloads / 1000 | 0)}k
                          </span>
                          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 16px', borderRadius: 99, background: 'var(--acc-grad)', color: '#fff', fontSize: 13.5, fontWeight: 650, boxShadow: '0 4px 14px -4px var(--acc-glow)', whiteSpace: 'nowrap' }}>
                            <Icon name="plus" style={{ fontSize: 11 }} /> Add
                          </span>
                        </div>
                      </button>
                    ))}
                  </Glass>
                )}
              </div>
              <Button onClick={(e) => handleAddMod(e)} disabled={loading || !modInput.trim()} style={{ height: 50, paddingLeft: 22, paddingRight: 22, flexShrink: 0, fontSize: 15, borderRadius: 14 }}>
                {loading ? <Icon name="arrows-rotate" className="spin" style={{ fontSize: 14 }} /> : <Icon name="plus" style={{ fontSize: 14 }} />} Add
              </Button>
              {isAdmin && (
                <Button variant="glass" onClick={() => setShowCustomModal(true)} style={{ height: 50, paddingLeft: 16, paddingRight: 16, flexShrink: 0, borderRadius: 14, fontSize: 13 }} title="Upload a custom / private JAR">
                  <Icon name="file-arrow-up" style={{ fontSize: 14 }} /> Custom JAR
                </Button>
              )}
            </div>
            {error && <p style={{ margin: '8px 0 0', fontSize: 12.5, color: 'var(--bad)', display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="circle-exclamation" style={{ fontSize: 11 }} /> {error}</p>}
          </div>

        {/* view toggles: libraries + dependency tree */}
        {activeTab === 'active' && (libraryCount > 0 || true) && (

              <button onClick={() => setShowLibraries(v => !v)}

                onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.1)'; e.currentTarget.style.color = 'var(--text)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.06)'; e.currentTarget.style.color = 'var(--text-dim)'; }}>
                <Icon name={showLibraries ? 'eye-slash' : 'layer-group'} style={{ fontSize: 12 }} />
                {showLibraries ? `Hide ${libraryCount} ${libraryCount === 1 ? 'library' : 'libraries'}` : `${libraryCount} ${libraryCount === 1 ? 'library mod' : 'library mods'} hidden`}
              </button>
            )}
            <button onClick={() => setShowUpgradePanel(v => !v)}
              style={{ background: showUpgradePanel ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 99, color: showUpgradePanel ? 'var(--text)' : 'var(--text-dim)', fontSize: 13, fontWeight: 580, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, padding: '5px 14px', fontFamily: 'var(--font)', transition: 'all .15s' }}
              onMouseEnter={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.1)'; e.currentTarget.style.color = 'var(--text)'; }}
              onMouseLeave={e => { e.currentTarget.style.background = showUpgradePanel ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.06)'; e.currentTarget.style.color = showUpgradePanel ? 'var(--text)' : 'var(--text-dim)'; }}>
              <Icon name={showUpgradePanel ? 'eye-slash' : 'diagram-project'} style={{ fontSize: 12 }} />

            </button>
          </div>
        )}

        {/* ===== Filter tags ===== */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 7, flexWrap: 'wrap' }}>
          {[
            { value: 'all', label: 'All' },
            { value: 'custom', label: 'Custom', color: 'var(--violet)' },
            activeTab === 'active' && vmDiskFiles !== null && { value: 'not-installed', label: 'Not on Server', color: 'var(--warn)' },
            activeTab === 'active' && { value: 'server-only', label: 'Server Only', color: 'var(--good)' },
            activeTab === 'active' && { value: 'client-only', label: 'Client Only', color: 'var(--info)' },
            activeTab === 'active' && libraryCount > 0 && { value: 'library', label: `Libraries (${libraryCount})`, color: 'var(--text-faint)' },
          ].filter(Boolean).map(f => (
            <button key={f.value} onClick={() => setFilter(f.value)}
              style={{
                padding: '6px 16px', borderRadius: 99, fontSize: 13, fontWeight: 640, cursor: 'pointer', border: 0,
                background: filter === f.value ? (f.color ? `color-mix(in oklab, ${f.color} 20%, transparent)` : 'rgba(255,255,255,0.12)') : 'rgba(255,255,255,0.06)',
                color: filter === f.value ? (f.color || 'var(--text)') : 'var(--text-dim)',
                outline: filter === f.value ? `1px solid ${f.color ? `color-mix(in oklab, ${f.color} 40%, transparent)` : 'rgba(255,255,255,0.25)'}` : '1px solid rgba(255,255,255,0.08)',
                transition: 'all .15s',
              }}>
              {f.label}
            </button>
          ))}
        </div>

        {/* ===== Grid ===== */}
        {visible.length === 0 ? (
          <Glass flat style={{ padding: '54px 20px', textAlign: 'center', borderRadius: 'var(--r-xl)' }}>
            <Icon name={activeTab === 'wishlist' ? 'heart' : 'cube'} style={{ fontSize: 30, color: 'var(--text-ghost)' }} />
            <p style={{ margin: '14px 0 4px', fontSize: 16, fontWeight: 600, color: 'var(--text-dim)' }}>
              {filterQuery || filter !== 'all' ? 'Nothing matches that filter' : activeTab === 'wishlist' ? 'No wishlist requests yet' : 'No mods on the server yet'}
            </p>
            <p style={{ margin: 0, fontSize: 13.5, color: 'var(--text-faint)' }}>
              {filterQuery || filter !== 'all' ? 'Try clearing your search or filter.' : 'Use "Add Mod" to search Modrinth and add your first one.'}
            </p>
            {!filterQuery && filter === 'all' && <Button onClick={() => setShowAddMod(true)} style={{ marginTop: 18 }}><Icon name="plus" style={{ fontSize: 12 }} /> Add a mod</Button>}
          </Glass>
        ) : (
          <div className="mod-grid" style={{ isolation: 'isolate' }}>
            {visible.map(mod => <ModCard key={mod.id} mod={mod} {...cardProps} />)}
          </div>
        )}
      </div>

      {/* hidden import input */}
      <input type="file" accept=".json" ref={fileInputRef} onChange={handleImportBackup} style={{ display: 'none' }} />

      {/* ===== Modals ===== */}
      <ScriptModal isOpen={showScriptModal} onClose={() => setShowScriptModal(false)} mods={mods} targetVersion={targetVersion} syncedVersion={syncedVersion} />
      <CustomModModal isOpen={showCustomModal} onClose={() => setShowCustomModal(false)} onAdd={handleAddCustomMod} storage={demo ? null : window.storage} />
      <SettingsModal isOpen={showSettingsModal} onClose={() => setShowSettingsModal(false)} initialName={serverName} initialIP={serverIP} initialUrl={panelUrl} initialVmUrl={vmApiUrl} initialVmKey={vmApiKey} initialFabricLoader={fabricLoaderVersion} initialFabricApi={fabricApiVersion} initialGameVer={serverVersion} initialTargetVer={targetVersion} onSave={handleSaveSettings} saveVersions={saveVersions} />
      <DependencyModal mod={activeEditingMod} allMods={mods} isOpen={!!editingDependencyId} onClose={() => setEditingDependencyId(null)} {...cardProps} />
      <RemoveConfirmModal target={removeConfirmTarget} onClose={() => setRemoveConfirmTarget(null)}
        onRemoveListOnly={() => handleRemoveConfirmed(removeConfirmTarget.mod.id, false, removeConfirmTarget.mod)}
        onRemoveListAndVM={() => handleRemoveConfirmed(removeConfirmTarget.mod.id, true, removeConfirmTarget.mod)} />
      <InstallConfirmModal target={installConfirmTarget} onClose={() => setInstallConfirmTarget(null)} onInstall={handleInstallMod} />
      <VmSyncModal isOpen={showVmSyncModal} onClose={() => setShowVmSyncModal(false)} loading={vmSyncLoading} data={vmSyncData} mods={mods} />
      <AddModConfirmModal
        target={addModConfirmTarget}
        onClose={() => setAddModConfirmTarget(null)}
        vmApiUrl={vmApiUrl}
        onAddListOnly={async (mod) => { setAddModConfirmTarget(null); await handleAddMod(null, mod.slug); }}
        onAddAndInstall={async (mod, version) => {
          await handleAddMod(null, mod.slug);
          await handleInstallMod(mod, version);
        }}
      />
      <MigrationModal isOpen={showMigrationModal} onClose={() => setShowMigrationModal(false)}
        mods={mods} serverVersion={serverVersion} targetVersion={targetVersion} syncedVersion={syncedVersion}
        isSyncMismatch={isSyncMismatch} fabricLoaderVersion={fabricLoaderVersion} fabricApiVersion={fabricApiVersion}
        isAdmin={isAdmin} checkAllUpdates={() => checkAllUpdates(mods, 'active')} checkingUpdates={checkingUpdates}
        saveVersions={saveVersions} setShowScriptModal={setShowScriptModal} />

      <ToastStack toasts={toasts} />
	 </div>
  );
};

  if (ctx.view === 'login') return <LoginView ctx={ctx} />;
  if (ctx.view === 'create') return <CreateView ctx={ctx} />;
  return <DashboardView ctx={ctx} />;
}

window.renderApp = renderApp;

// ============================================================
//  manager.jsx - ModManager component (logic). Views appended below.
// ============================================================

function ModManager() {
  // --- Theme ---
  const [theme, setTheme] = useState(() => { localStorage.removeItem('mm-theme'); return 'aurora'; });
  useEffect(() => {
    document.body.classList.remove('theme-aurora', 'theme-frost', 'theme-nebula');
    document.body.classList.add('theme-' + theme);
    localStorage.setItem('mm-theme', theme);
  }, [theme]);

  // --- Auth & routing ---
  const [user, setUser] = useState(null);
  const [view, setView] = useState('login');
  const [accessLevel, setAccessLevel] = useState('guest');
  const [serverDocId, setServerDocId] = useState(null);
  const [sessionCodes, setSessionCodes] = useState({ admin: '', user: '' });
  const [serverName, setServerName] = useState('My Server');
  const [serverIP, setServerIP] = useState('');
  const [panelUrl, setPanelUrl] = useState('');
  const [serverStatus, setServerStatus] = useState(null);
  const [demo, setDemo] = useState(false);

  // --- Data ---
  const [serverVersion, setServerVersion] = useState('26.1');
  const [targetVersion, setTargetVersion] = useState('26.1.1');
  const [syncedVersion, setSyncedVersion] = useState(null);
  const [fabricLoaderVersion, setFabricLoaderVersion] = useState('');
  const [fabricApiVersion, setFabricApiVersion] = useState('');
  // loader is always 'fabric' - no state needed
  const [activeTab, setActiveTab] = useState('active');
  const [mods, setMods] = useState([]);
  const [wishlist, setWishlist] = useState([]);

  // --- UI ---
  const [modInput, setModInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [checkingUpdates, setCheckingUpdates] = useState(false);
  const [showLibraries, setShowLibraries] = useState(false);
  const [joinCode, setJoinCode] = useState('');
  const [isSyncing, setIsSyncing] = useState(false);
  const [showScriptModal, setShowScriptModal] = useState(false);
  const [editingDependencyId, setEditingDependencyId] = useState(null);
  const [showCustomModal, setShowCustomModal] = useState(false);
  const [showSettingsModal, setShowSettingsModal] = useState(false);
  const [searchResults, setSearchResults] = useState([]);
  const [showDropdown, setShowDropdown] = useState(false);
  const debouncedSearch = useDebounce(modInput, 300);
  const [filterQuery, setFilterQuery] = useState('');
  const [showAddMod, setShowAddMod] = useState(false);
  const [vmApiUrl, setVmApiUrl] = useState('');
  const [vmApiKey, setVmApiKey] = useState(() => localStorage.getItem('modrinth-vm-api-key') || '');
  const [installStatus, setInstallStatus] = useState({});
  const [vmDiskFiles, setVmDiskFiles] = useState(null);
  const [showUpgradePanel, setShowUpgradePanel] = useState(false);
  const [showMigrationModal, setShowMigrationModal] = useState(false);
  const [showActionsMenu, setShowActionsMenu] = useState(false);
  const [showVmSyncModal, setShowVmSyncModal] = useState(false);
  const [vmSyncData, setVmSyncData] = useState(null);
  const [vmSyncLoading, setVmSyncLoading] = useState(false);
  const [removeConfirmTarget, setRemoveConfirmTarget] = useState(null);
  const [installConfirmTarget, setInstallConfirmTarget] = useState(null);
  const [addModConfirmTarget, setAddModConfirmTarget] = useState(null);
  const [sortBy, setSortBy] = useState('name');
  const [filter, setFilter] = useState('all'); // 'all' | 'ready' | 'missing' | 'custom'
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = 'success') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
  }, []);
  const [newServerName, setNewServerName] = useState('');
  const [newServerIP, setNewServerIP] = useState('');
  const fileInputRef = useRef(null);
  const [importStatus, setImportStatus] = useState(null);
  const [heroNote, setHeroNote] = useState('');

  const docRef = () => db.collection('artifacts').doc(storageAppId).collection('public').doc('data').collection('servers').doc(serverDocId);

  // --- Auth init ---
  useEffect(() => {
    if (!firebaseOk) return;
    (async () => { try { await auth.signInAnonymously(); } catch (e) { console.error("Auth Error:", e); } })();
    return auth.onAuthStateChanged(setUser);
  }, []);

  // --- Server status checker ---
  useEffect(() => {
    if (!serverIP || view !== 'dashboard' || demo) return;
    const check = async () => {
      try {
        const res = await fetch(`https://api.mcsrvstat.us/2/${serverIP}`);
        if (res.ok) { const d = await res.json(); setServerStatus({ online: d.online, players: d.players, version: d.version }); }
      } catch (e) { console.warn("status check failed", e); }
    };
    check();
    const t = setInterval(check, 60000);
    return () => clearInterval(t);
  }, [serverIP, view, demo]);

  // --- Join ---
  const attemptJoin = useCallback(async (code) => {
    if (!code || !user) return;
    setLoading(true);
    try {
      const codeUpper = code.trim().toUpperCase();
      const base = db.collection('artifacts').doc(storageAppId).collection('public').doc('data').collection('servers');
      let foundDoc = null, role = 'guest', foundCodes = { admin: '', user: '' };
      const adminSnap = await base.where('adminCode', '==', codeUpper).limit(1).get();
      if (!adminSnap.empty) {
        adminSnap.forEach(doc => { foundDoc = doc; role = 'admin'; foundCodes = { admin: doc.data().adminCode, user: doc.data().userCode }; });
      } else {
        const userSnap = await base.where('userCode', '==', codeUpper).limit(1).get();
        userSnap.forEach(doc => { foundDoc = doc; role = 'user'; foundCodes = { admin: 'HIDDEN', user: doc.data().userCode }; });
      }
      if (foundDoc) {
        setServerDocId(foundDoc.id); setAccessLevel(role); setSessionCodes(foundCodes);
        localStorage.setItem('modrinth-server-code', codeUpper);
        setActiveTab(role === 'admin' ? 'active' : 'wishlist');
        setView('dashboard');
      } else { setError("Invalid access code."); }
    } catch (err) { console.error(err); setError("Failed to join. Connection error."); }
    finally { setLoading(false); }
  }, [user]);

  // --- Auto-login ---
  useEffect(() => {
    if (!user || serverDocId || demo) return;
    const params = new URLSearchParams(window.location.search);
    const urlCode = params.get('code');
    const storedCode = localStorage.getItem('modrinth-server-code');
    if (urlCode) { window.history.replaceState({}, document.title, window.location.pathname); attemptJoin(urlCode); }
    else if (storedCode) { attemptJoin(storedCode); }
  }, [user, serverDocId, attemptJoin, demo]);

  // --- Real-time listener ---
  useEffect(() => {
    if (!user || !serverDocId || demo) return;
    setIsSyncing(true);
    const unsub = docRef().onSnapshot((snap) => {
      if (snap.exists) {
        const d = snap.data();
        setMods(d.mods || []); setWishlist(d.wishlist || []);
        setServerVersion(d.serverVersion || '26.1'); setTargetVersion(d.targetVersion || '26.1.1');
        setServerName(d.serverName || 'My Server'); setServerIP(d.serverIP || '');
        setPanelUrl(d.panelUrl || ''); setVmApiUrl(d.vmApiUrl || '');
        setHeroNote(d.heroNote || '');
        setSyncedVersion(d.syncedVersion || d.serverVersion || '26.1');
        if (d.fabricLoaderVersion !== undefined) setFabricLoaderVersion(d.fabricLoaderVersion || '');
        if (d.fabricApiVersion !== undefined) setFabricApiVersion(d.fabricApiVersion || '');
        setIsSyncing(false);
      } else {
        setError("Server deleted or unavailable."); localStorage.removeItem('modrinth-server-code'); setView('login');
      }
    }, (err) => {
      console.error("Sync error:", err);
      setError(err.code === 'permission-denied' ? "Permission denied. Check Firestore rules." : `Connection error: ${err.message}`);
    });
    return () => unsub();
  }, [user, serverDocId, demo]);

  // --- Search ---
  useEffect(() => {
    if (!debouncedSearch || debouncedSearch.length < 2) { setSearchResults([]); return; }
    if (debouncedSearch.includes('/') || debouncedSearch.includes('modrinth.com')) { setSearchResults([]); return; }
    (async () => {
      try {
        const facets = JSON.stringify([[`categories:${LOADER}`], ["project_type:mod"], [`versions:${serverVersion}`, `versions:${targetVersion}`], ["server_side:required", "server_side:optional"]]);
        const res = await fetch(`${MODRINTH_API_BASE}/search?query=${debouncedSearch}&limit=6&facets=${facets}`);
        const data = await res.json();
        setSearchResults(data.hits || []); setShowDropdown(true);
      } catch (e) { console.error("Search error", e); }
    })();
  }, [debouncedSearch, serverVersion, targetVersion]);

  // --- Create ---
  const handleCreateServer = async (e) => {
    e.preventDefault();
    if (!firebaseOk || !user) { setError("Not connected to auth service. Try Demo mode."); return; }
    if (!newServerName.trim()) { setError("Please provide a server name."); return; }
    setLoading(true); setError(null);
    const adminCode = generateCode('ADM'), userCode = generateCode('USR');
    const newId = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);
    try {
      await db.collection('artifacts').doc(storageAppId).collection('public').doc('data').collection('servers').doc(newId).set({
        createdAt: new Date().toISOString(), serverName: newServerName.trim(), serverIP: newServerIP.trim(),
        adminCode, userCode, serverVersion: '26.1', targetVersion: '26.1.1', syncedVersion: '26.1.1', mods: [], wishlist: []
      });
      setServerDocId(newId); setSessionCodes({ admin: adminCode, user: userCode }); setAccessLevel('admin');
      setServerName(newServerName.trim()); setServerIP(newServerIP.trim());
      localStorage.setItem('modrinth-server-code', adminCode); setActiveTab('active'); setView('dashboard');
    } catch (err) {
      setError(err.code === 'permission-denied' ? "Permission denied. Enable Firestore rules." : `Failed to create: ${err.message}`);
    } finally { setLoading(false); }
  };

  // --- Demo entry ---
  const enterDemo = () => {
    setDemo(true); setAccessLevel('admin'); setServerDocId('DEMO');
    setSessionCodes({ admin: 'ADM-DEMO', user: 'USR-DEMO' });
    setServerName('The Boys SMP'); setServerIP('play.theboys.gg'); setPanelUrl('https://panel.theboys.gg');
    setMods(DEMO_MODS); setWishlist(DEMO_WISHLIST);
    setServerVersion('26.1'); setTargetVersion('26.1.1'); setSyncedVersion('26.1');
    setServerStatus({ online: true, players: { online: 7, max: 20 }, version: '26.1' });
    // Simulate a connected VM - show On Server badges and install controls
    setVmApiUrl('https://demo-vm.theboys.gg');
    setVmDiskFiles([
      'sodium-mc26.1-0.6.9.jar',
      'fabric-api-0.116.0+26.1.jar',
      'lithium-mc26.1-0.14.5.jar',
      'ferritecore-8.0.0.jar',
      'iris-1.8.8.jar',
      // modmenu and indium not "installed" - to show the not-installed badge
    ]);
    setActiveTab('active'); setView('dashboard');
  };

  const handleLogout = () => {
    if (!demo) localStorage.removeItem('modrinth-server-code');
    setDemo(false); setServerDocId(null); setAccessLevel('guest'); setView('login'); setJoinCode('');
    setMods([]); setWishlist([]); setServerStatus(null); setVmDiskFiles(null);
  };

  // --- Save (branches on demo) ---
  const saveToServer = async (newMods, newWishlist, newSynced = null) => {
    if (demo) {
      if (newMods) setMods(newMods);
      if (newWishlist) setWishlist(newWishlist);
      if (newSynced) setSyncedVersion(newSynced);
      return;
    }
    if (!serverDocId) return;
    const upd = { mods: newMods || mods, wishlist: newWishlist || wishlist, lastUpdated: new Date().toISOString() };
    if (newSynced) upd.syncedVersion = newSynced;
    await docRef().update(upd);
  };

  const saveVersions = async (sVer, tVer) => {
    setServerVersion(sVer); setTargetVersion(tVer);
    if (demo || !serverDocId || accessLevel !== 'admin') return;
    await docRef().update({ serverVersion: sVer, targetVersion: tVer });
  };

  const fetchModInfo = async (slug) => {
    const res = await fetch(`${MODRINTH_API_BASE}/project/${slug}`);
    if (!res.ok) throw new Error('Mod not found');
    return await res.json();
  };

  const fetchModVersions = useCallback(async (slug) => {
    try {
      const query = `?loaders=["${LOADER}"]&game_versions=${JSON.stringify([serverVersion, targetVersion])}`;
      const res = await fetch(`${MODRINTH_API_BASE}/project/${slug}/version${query}`);
      if (!res.ok) return [];
      const versions = await res.json();
      return versions.map(v => { const pf = v.files.find(f => f.primary) || v.files[0]; return { ...v, primary_file_url: pf ? pf.url : null }; });
    } catch (e) { return []; }
  }, [serverVersion, targetVersion]);

  const handleAddCustomMod = async (name, desc, url) => {
    const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    const newMod = {
      id: `custom-${(typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).substring(2, 9)}`,
      slug, title: name, description: desc || 'Custom uploaded mod', icon_url: null, isCustom: true, customUrl: url || null,
      installed_version: 'Custom', target_version_number: 'Custom', project_url: url || null, updated_at: new Date().toISOString(),
      status: 'ready', note: '', upvotes: [], downvotes: [], enabled: true,
    };
    if (activeTab === 'active') await saveToServer([...mods, newMod], null);
    else await saveToServer(null, [...wishlist, newMod]);
    addToast(`${name} added`);
  };

  const handleAddMod = async (e, manualInput = null, overrideTab = null) => {
    if (e) e.preventDefault();
    const inputVal = manualInput || modInput;
    if (!inputVal.trim()) return;
    setSearchResults([]); setShowDropdown(false);
    const trimmed = inputVal.trim();
    const urlMatch = trimmed.match(/modrinth\.com\/[\w-]+\/([^\/?#\s]+)/);
    const cleanSlug = (urlMatch ? urlMatch[1] : trimmed).toLowerCase();

    // Modrinth URL pasted directly (not a programmatic dependency add) - go through the confirm modal
    if (urlMatch && !manualInput) {
      setLoading(true); setError(null);
      try {
        const [info, allV] = await Promise.all([
          fetch(`${MODRINTH_API_BASE}/project/${cleanSlug}`).then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); }),
          fetch(`${MODRINTH_API_BASE}/project/${cleanSlug}/version?loaders=["${LOADER}"]&game_versions=${JSON.stringify([serverVersion, targetVersion])}`)
            .then(r => r.ok ? r.json() : []).catch(() => [])
        ]);
        const svCands = allV.filter(v => v.game_versions.includes(serverVersion));
        const tvCands = allV.filter(v => v.game_versions.includes(targetVersion));
        const latestSv = svCands[0], latestTv = tvCands[0];
        const pFile = latestTv ? (latestTv.files.find(f => f.primary) || latestTv.files[0]) : null;
        setAddModConfirmTarget({
          mod: {
            id: info.id, slug: info.slug, title: info.title, icon_url: info.icon_url,
            description: info.description, server_side: info.server_side, client_side: info.client_side,
            categories: (info.categories || []).filter(c => !['fabric','forge','quilt','neoforge','liteloader'].includes(c)),
            installed_version: latestSv ? latestSv.version_number : 'Not Installed',
            server_candidates: svCands.map(v => v.version_number),
            target_version_number: latestTv ? latestTv.version_number : 'None Found',
            primary_file_url: pFile ? pFile.url : null,
            target_changelog: latestTv ? (latestTv.changelog || null) : null,
            dependencies: latestSv ? latestSv.dependencies : [],
            project_url: `https://modrinth.com/mod/${info.slug}`,
            status: latestTv ? 'ready' : 'missing',
            enabled: true, upvotes: [], downvotes: [], note: ''
          }
        });
        setModInput('');
      } catch (err) { setError("Couldn't find that mod. Check the URL."); }
      finally { setLoading(false); }
      return;
    }

    // Direct slug add (used by dependency resolution, deep links, etc.)
    if (mods.some(m => m.slug === cleanSlug)) { if (!manualInput) setError("Already on the server."); return; }
    if (activeTab === 'wishlist' && wishlist.some(m => m.slug === cleanSlug)) { if (!manualInput) setError("Already in the wishlist."); return; }
    setLoading(true); if (!manualInput) setError(null);
    try {
      const info = await fetchModInfo(cleanSlug);
      const allVersions = await fetchModVersions(info.slug);
      const serverCandidates = allVersions.filter(v => v.game_versions.includes(serverVersion));
      const targetCandidates = allVersions.filter(v => v.game_versions.includes(targetVersion));
      const latestServer = serverCandidates[0] || null, latestTarget = targetCandidates[0] || null;
      const newMod = {
        id: info.id, slug: info.slug, title: info.title, icon_url: info.icon_url, description: info.description,
        categories: (info.categories || []).filter(c => !['fabric','forge','quilt','neoforge','liteloader'].includes(c)),
        server_side: info.server_side || null, client_side: info.client_side || null,
        installed_version: latestServer ? latestServer.version_number : 'Not Installed',
        server_candidates: serverCandidates.map(v => v.version_number),
        target_version_number: latestTarget ? latestTarget.version_number : 'None Found',
        target_file_url: latestTarget ? `https://modrinth.com/mod/${info.slug}/version/${latestTarget.version_number}` : null,
        primary_file_url: latestTarget ? latestTarget.primary_file_url : null,
        target_changelog: latestTarget ? (latestTarget.changelog || null) : null,
        dependencies: latestServer ? latestServer.dependencies : [],
        project_url: `https://modrinth.com/mod/${info.slug}`, updated_at: new Date().toISOString(),
        status: latestTarget ? 'ready' : 'missing', note: '', upvotes: [], downvotes: [], enabled: true,
      };
      const targetList = overrideTab || activeTab;
      if (targetList === 'active') await saveToServer([...mods, newMod], null);
      else await saveToServer(null, [...wishlist, newMod]);
      setModInput('');
      addToast(`${info.title} added`);
    } catch (err) { if (!manualInput) setError("Couldn't find that mod. Check the slug/URL."); }
    finally { setLoading(false); }
  };

  // --- Deep link add ---
  useEffect(() => {
    if (isSyncing || demo) return;
    const params = new URLSearchParams(window.location.search);
    const modToAdd = params.get('add_to_wishlist');
    if (modToAdd) {
      window.history.replaceState({}, '', window.location.pathname);
      setActiveTab('wishlist'); handleAddMod(null, modToAdd, 'wishlist');
    }
  }, [isSyncing]);

  const handleRemoveMod = (mod, isOnDisk) => {
    if (typeof mod === 'string') { handleRemoveConfirmed(mod, false, null); return; }
    setRemoveConfirmTarget({ mod, isOnDisk: !!isOnDisk, vmConfigured: !!vmApiUrl });
  };

  const handleRemoveConfirmed = async (modId, removeFromVm, mod) => {
    setRemoveConfirmTarget(null);
    if (removeFromVm && mod) { const ok = await handleRemoveFromVM(mod, mod.installed_version); if (!ok) return; }
    if (activeTab === 'active') {
      if (accessLevel !== 'admin') return;
      await saveToServer(mods.filter(m => m.id !== modId), null);
    } else { await saveToServer(null, wishlist.filter(m => m.id !== modId)); }
    addToast('Removed', 'info');
  };

  const handleApproveWishlist = async (mod) => {
    if (accessLevel !== 'admin') return;
    const newWishlist = wishlist.filter(m => m.id !== mod.id);
    let newMods = [...mods];
    if (!mods.some(m => m.slug === mod.slug)) { const { note, noteAuthorId, upvotes, downvotes, ...clean } = mod; newMods.push(clean); }
    await saveToServer(newMods, newWishlist);
    addToast(`${mod.title} promoted to Server Mods`);
  };

  const handleVote = async (modId, type) => {
    if (!user && !demo) return;
    const uid = (user && user.uid) || 'demo-me';
    const updated = wishlist.map(m => {
      if (m.id !== modId) return m;
      let ups = (m.upvotes || []).filter(id => id !== uid), downs = (m.downvotes || []).filter(id => id !== uid);
      const hadUp = (m.upvotes || []).includes(uid), hadDown = (m.downvotes || []).includes(uid);
      if (type === 'up' && !hadUp) ups.push(uid);
      if (type === 'down' && !hadDown) downs.push(uid);
      return { ...m, upvotes: ups, downvotes: downs };
    });
    await saveToServer(null, updated);
  };

  // --- VM ---
  const vmBase = () => vmApiUrl.replace(/\/+$/, '');
  // Demo-mode VM install - just updates local disk file list
  const demoInstall = (mod, versionNumber) => {
    const filename = mod.isCustom ? `${mod.slug}.jar` : `${mod.slug}-${versionNumber}.jar`;
    setVmDiskFiles(prev => [...(prev || []).filter(f => !f.startsWith(mod.slug + '-') && f !== mod.slug + '.jar'), filename]);
    addToast(`${mod.title} installed (demo)`);
  };
  const demoRemove = (mod) => {
    setVmDiskFiles(prev => (prev || []).filter(f => !f.startsWith(mod.slug + '-') && f !== mod.slug + '.jar'));
    addToast(`${mod.title} removed (demo)`, 'info');
  };
  const VM_API_KEY = vmApiKey;

  const handleInstallMod = async (mod, versionNumber) => {
    if (!vmApiUrl) return;
    if (demo) { demoInstall(mod, versionNumber); return; }
    setInstallStatus(p => ({ ...p, [mod.id]: 'installing' }));
    try {
      let downloadUrl, filename;
      if (mod.isCustom) { if (!mod.customUrl) throw new Error('No URL for this custom mod'); downloadUrl = mod.customUrl; filename = `${mod.slug}.jar`; }
      else {
        const vRes = await fetch(`${MODRINTH_API_BASE}/project/${mod.slug}/version?loaders=["${LOADER}"]&game_versions=["${serverVersion}"]`);
        if (!vRes.ok) throw new Error('Could not fetch version info');
        const versions = await vRes.json();
        const m = versions.find(v => v.version_number === versionNumber);
        if (!m) throw new Error(`Version ${versionNumber} not found`);
        const pf = m.files.find(f => f.primary) || m.files[0];
        if (!pf) throw new Error('No download file found');
        downloadUrl = pf.url; filename = `${mod.slug}-${versionNumber}.jar`;
      }
      const res = await fetch(`${vmBase()}/install`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': VM_API_KEY }, body: JSON.stringify({ url: downloadUrl, filename, slug: mod.slug }) });
      if (!res.ok) throw new Error(`VM responded ${res.status}`);
      const resData = await res.json();
      const actualFilename = resData.installed || filename;
      const freshDoc = await docRef().get();
      const freshMods = freshDoc.data()?.mods || mods;
      const updatedMods = freshMods.map(m => m.id === mod.id
        ? { ...m, installedJarFile: actualFilename, installed_version: mod.isCustom ? m.installed_version : versionNumber }
        : m);
      await saveToServer(updatedMods, null);
      setVmDiskFiles(p => p ? [...p.filter(f => { const b = f.replace(/\.disabled$/, ''); return !b.startsWith(mod.slug + '-') && b !== mod.slug + '.jar'; }), actualFilename] : [actualFilename]);
      addToast(`${mod.title}${mod.isCustom ? '' : ' ' + versionNumber} installed to VM`);
      setInstallStatus(p => ({ ...p, [mod.id]: 'done' }));
      setTimeout(() => setInstallStatus(p => { const n = { ...p }; delete n[mod.id]; return n; }), 3000);
    } catch (err) {
      addToast(`Failed to install ${mod.title}: ${err.message}`, 'error');
      setInstallStatus(p => ({ ...p, [mod.id]: 'error' }));
      setTimeout(() => setInstallStatus(p => { const n = { ...p }; delete n[mod.id]; return n; }), 4000);
      throw err;
    }
  };

  const handleRemoveFromVM = async (mod, selectedVersion) => {
    if (!vmApiUrl) return false;
    if (demo) { demoRemove(mod); return true; }
    const onDiskFile = mod.installedJarFile
      ? vmDiskFiles && vmDiskFiles.find(f => f.replace(/\.disabled$/, '') === mod.installedJarFile)
      : vmDiskFiles && vmDiskFiles.find(f => f.startsWith(mod.slug + '-') || f === mod.slug + '.jar');
    const filename = onDiskFile || mod.installedJarFile || (mod.isCustom ? `${mod.slug}.jar` : `${mod.slug}-${selectedVersion || mod.installed_version}.jar`);
    setInstallStatus(p => ({ ...p, [mod.id]: 'removing' }));
    try {
      const res = await fetch(`${vmBase()}/remove/${encodeURIComponent(filename)}`, { method: 'DELETE', headers: { 'x-api-key': VM_API_KEY } });
      if (!res.ok) throw new Error(`VM responded ${res.status}${res.status === 401 ? ' (wrong API key?)' : ''}`);
      setVmDiskFiles(p => p ? p.filter(f => f !== filename) : null);
      addToast(`${mod.title} removed from VM`, 'info');
      setInstallStatus(p => { const n = { ...p }; delete n[mod.id]; return n; });
      return true;
    } catch (err) {
      addToast(`Failed to remove ${mod.title}: ${err.message}`, 'error');
      setInstallStatus(p => ({ ...p, [mod.id]: 'error' }));
      setTimeout(() => setInstallStatus(p => { const n = { ...p }; delete n[mod.id]; return n; }), 4000);
      return false;
    }
  };

  useEffect(() => {
    if (!vmApiUrl || !serverDocId || demo) return;
    (async () => {
      try {
        const res = await fetch(`${vmApiUrl.replace(/\/+$/, '')}/mods`, { headers: { 'x-api-key': VM_API_KEY } });
        if (res.status === 401) { addToast('VM API key wrong/missing - disk status unavailable', 'error'); return; }
        if (!res.ok) { addToast(`VM unreachable (${res.status})`, 'error'); return; }
        const data = await res.json(); setVmDiskFiles(data.files || []);
      } catch (e) { addToast('Could not reach VM - check the API URL in Settings', 'error'); }
    })();
  }, [vmApiUrl, serverDocId, demo]);

  // Reads actual JAR filenames from the VM and updates installed_version in Firestore to match
  const handleSyncVersionsFromDisk = async () => {
    if (!vmApiUrl) { addToast('No VM API configured', 'error'); return; }
    setLoading(true);
    try {
      const res = await fetch(`${vmBase()}/mods`, { headers: { 'x-api-key': VM_API_KEY } });
      if (res.status === 401) throw new Error('Unauthorised - check VM API key in Settings');
      if (!res.ok) throw new Error(`VM responded ${res.status}`);
      const data = await res.json();
      const diskFiles = data.files || [];
      setVmDiskFiles(diskFiles);

      let updated = 0;
      const updatedMods = mods.map(mod => {
        if (mod.isCustom) return mod;

        // Already have an exact filename recorded - verify it still exists, nothing else to do
        if (mod.installedJarFile && diskFiles.find(f => f.replace(/\.disabled$/, '') === mod.installedJarFile)) return mod;

        // Legacy: no installedJarFile set yet - find by slug and record it
        const diskFile = diskFiles.find(f => f.startsWith(mod.slug + '-') || f === mod.slug + '.jar');
        if (!diskFile) return mod;

        updated++;
        return { ...mod, installedJarFile: diskFile.replace(/\.disabled$/, '') };
      });

      if (updated > 0) {
        await saveToServer(updatedMods, null);
        addToast(`Recorded filenames for ${updated} mod${updated === 1 ? '' : 's'}`);
      } else {
        addToast('All mods already have filenames recorded', 'info');
      }
    } catch (err) { addToast(`Sync failed: ${err.message}`, 'error'); }
    finally { setLoading(false); }
  };

  const handleBatchReinstall = async () => {
    if (!vmApiUrl) { addToast('No VM API configured', 'error'); return; }
    const targets = mods.filter(m =>
      !m.isCustom &&
      !m.installedJarFile &&
      (m.server_candidates || []).length >= 1 &&
      vmDiskFiles && vmDiskFiles.find(f => f.startsWith(m.slug + '-') || f === m.slug + '.jar')
    );
    if (targets.length === 0) { addToast('All mods already have filenames recorded', 'info'); return; }
    addToast(`Fixing filenames for ${targets.length} mod${targets.length === 1 ? '' : 's'}...`, 'info');
    let done = 0, failed = 0;
    for (const mod of targets) {
      try {
        await handleInstallMod(mod, mod.server_candidates[0]);
        done++;
      } catch (e) { failed++; }
      await new Promise(r => setTimeout(r, 600));
    }
    addToast(`Fixed ${done} mod${done === 1 ? '' : 's'}${failed > 0 ? `, ${failed} failed` : ''}`);
  };

  // Fetches categories/tags from Modrinth for all mods that are missing them and saves to Firestore
  const handleSyncTagsFromModrinth = async () => {
    const loaderTags = new Set(['fabric','forge','quilt','neoforge','liteloader']);
    const toUpdate = mods.filter(m => !m.isCustom && (!m.categories || m.categories.length === 0));
    if (toUpdate.length === 0) { addToast('All mods already have tags', 'info'); return; }
    setLoading(true);
    try {
      const BATCH = 6, delay = ms => new Promise(r => setTimeout(r, ms));
      let working = [...mods];
      for (let i = 0; i < toUpdate.length; i += BATCH) {
        const batch = toUpdate.slice(i, i + BATCH);
        const results = await Promise.all(batch.map(async mod => {
          try {
            const info = await fetch(`${MODRINTH_API_BASE}/project/${mod.slug}`).then(r => r.ok ? r.json() : null);
            if (!info) return mod;
            return { ...mod, categories: (info.categories || []).filter(c => !loaderTags.has(c)) };
          } catch { return mod; }
        }));
        results.forEach(u => { const idx = working.findIndex(m => m.id === u.id); if (idx !== -1) working[idx] = u; });
        if (i + BATCH < toUpdate.length) await delay(800);
      }
      await saveToServer(working, null);
      addToast(`Tags synced for ${toUpdate.length} mod${toUpdate.length === 1 ? '' : 's'}`);
    } catch (err) { addToast(`Tag sync failed: ${err.message}`, 'error'); }
    finally { setLoading(false); }
  };

  const handleVmSync = async () => {
    if (!vmApiUrl) return;
    setVmSyncLoading(true); setShowVmSyncModal(true); setVmSyncData(null);
    try {
      const res = await fetch(`${vmBase()}/mods`, { headers: { 'x-api-key': VM_API_KEY } });
      if (res.status === 401) throw new Error('Unauthorised - check your VM API key in Settings');
      if (!res.ok) throw new Error(`VM responded ${res.status}`);
      setVmSyncData(await res.json());
    } catch (err) { setVmSyncData({ error: err.message }); }
    finally { setVmSyncLoading(false); }
  };

  const handleUpdateNote = async (modId, newNote, authorId) => {
    const updated = wishlist.map(m => {
      if (m.id === modId) {
        const currentAuthor = m.noteAuthorId || authorId;
        if (m.noteAuthorId && m.noteAuthorId !== authorId && accessLevel !== 'admin') return m;
        return { ...m, note: newNote, noteAuthorId: currentAuthor };
      }
      return m;
    });
    await saveToServer(null, updated);
  };

  const handleSaveHeroNote = async (note) => {
    setHeroNote(note);
    if (demo || !serverDocId || accessLevel !== 'admin') return;
    try { await docRef().update({ heroNote: note }); } catch (e) { /* silent */ }
  };

  const handleToggleMod = async (modId) => {
    if (accessLevel !== 'admin') return;
    const mod = mods.find(m => m.id === modId);
    if (!mod) return;
    const newEnabled = !(mod.enabled !== false);
    const updated = mods.map(m => m.id === modId ? { ...m, enabled: newEnabled } : m);
    await saveToServer(updated, null);

    // VM: rename jar ↔ jar.disabled if we have a file on disk
    if (vmApiUrl && !demo && vmDiskFiles) {
      const diskFile = mod.installedJarFile
        ? vmDiskFiles.find(f => f.replace(/\.disabled$/, '') === mod.installedJarFile)
        : vmDiskFiles.find(f => {
            const base = f.replace(/\.disabled$/, '');
            return base.startsWith(mod.slug + '-') || base === mod.slug + '.jar';
          });
      if (diskFile) {
        try {
          const res = await fetch(`${vmBase()}/toggle`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-api-key': VM_API_KEY },
            body: JSON.stringify({ filename: diskFile, enable: newEnabled })
          });
          if (res.ok) {
            const newFilename = newEnabled
              ? diskFile.replace(/\.disabled$/, '')
              : diskFile + '.disabled';
            setVmDiskFiles(p => p ? [...p.filter(f => f !== diskFile), newFilename] : null);
          }
        } catch (e) { /* Firebase updated; VM rename failed silently */ }
      }
    }
    addToast(`${mod.title} ${newEnabled ? 'enabled' : 'disabled'}`);
  };

  const handleVersionChange = async (modId, newVersion) => {
    if (activeTab === 'active' && accessLevel !== 'admin') return;
    const list = activeTab === 'active' ? mods : wishlist;
    const updated = list.map(m => m.id === modId ? { ...m, installed_version: newVersion } : m);
    if (activeTab === 'active') await saveToServer(updated, null); else await saveToServer(null, updated);
  };

  const handleSaveSettings = async (newName, newIp, newUrl, newVmUrl, newVmKey, newFabricLoader, newFabricApi, newGameVer) => {
    if (newVmKey !== undefined) {
      if (newVmKey.trim()) localStorage.setItem('modrinth-vm-api-key', newVmKey.trim());
      else localStorage.removeItem('modrinth-vm-api-key');
      setVmApiKey(newVmKey.trim());
    }
    setServerName(newName.trim()); setServerIP(newIp.trim()); setPanelUrl(newUrl.trim()); setVmApiUrl(newVmUrl.trim());
    if (newFabricLoader !== undefined) setFabricLoaderVersion(newFabricLoader.trim());
    if (newFabricApi !== undefined) setFabricApiVersion(newFabricApi.trim());
    if (demo || !serverDocId || accessLevel !== 'admin') return;
    try { await docRef().update({ serverName: newName.trim(), serverIP: newIp.trim(), panelUrl: newUrl.trim(), vmApiUrl: newVmUrl.trim(), fabricLoaderVersion: newFabricLoader?.trim() || '', fabricApiVersion: newFabricApi?.trim() || '' }); }
    catch (e) { setError("Failed to save settings."); }
  };

  const handleExportBackup = () => {
    const data = { modManagerVersion: '1.0', timestamp: new Date().toISOString(), serverName, serverIP, serverVersion, targetVersion, mods, wishlist };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob); const a = document.createElement('a');
    a.href = url; a.download = `modmanager_backup_${serverName.replace(/\s/g, '_')}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    addToast('Backup downloaded');
  };

  const triggerImport = () => { if (accessLevel === 'admin') fileInputRef.current.click(); };
  const handleImportBackup = (event) => {
    if (accessLevel !== 'admin') { event.target.value = null; return; }
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const c = JSON.parse(e.target.result);
        if (!c.mods || !c.wishlist) throw new Error("Invalid file structure.");
        setServerVersion(c.serverVersion || '26.1'); setTargetVersion(c.targetVersion || '26.1.1');
        if (demo) { setMods(c.mods); setWishlist(c.wishlist); setServerName(c.serverName || serverName); }
        else await docRef().update({ serverName: c.serverName || serverName, serverIP: c.serverIP || serverIP, serverVersion: c.serverVersion || serverVersion, targetVersion: c.targetVersion || targetVersion, mods: c.mods, wishlist: c.wishlist, lastUpdated: new Date().toISOString() });
        addToast('Data imported & synced');
      } catch (err) { addToast(`Import failed: ${err.message}`, 'error'); }
    };
    reader.readAsText(file); event.target.value = null;
  };

  const checkAllUpdates = useCallback(async (listToUpdate = mods, tab = 'active') => {
    if (listToUpdate.length === 0) return;
    setCheckingUpdates(true);
    const BATCH = 5, DELAY = 1200, delay = (ms) => new Promise(r => setTimeout(r, ms));
    let working = [...listToUpdate];
    for (let i = 0; i < listToUpdate.length; i += BATCH) {
      const batch = listToUpdate.slice(i, i + BATCH);
      const results = await Promise.all(batch.map(async (mod) => {
        if (mod.isCustom) return mod;
        try {
          const allVersions = await fetchModVersions(mod.slug);
          const sc = allVersions.filter(v => v.game_versions.includes(serverVersion));
          const tc = allVersions.filter(v => v.game_versions.includes(targetVersion));
          const ls = sc[0] || null, lt = tc[0] || null;
          const currentInstalled = mod.installed_version === 'Not Installed' && ls ? ls.version_number : mod.installed_version;
          const vObj = sc.find(v => v.version_number === currentInstalled);
          return { ...mod, server_candidates: sc.map(v => v.version_number), installed_version: currentInstalled,
            target_version_number: lt ? lt.version_number : 'None Found',
            target_file_url: lt ? `https://modrinth.com/mod/${mod.slug}/version/${lt.version_number}` : null,
            primary_file_url: lt ? lt.primary_file_url : null,
            target_changelog: lt ? (lt.changelog || null) : null,
            dependencies: vObj ? vObj.dependencies : (mod.dependencies || []),
            status: lt ? 'ready' : 'missing', enabled: mod.enabled !== undefined ? mod.enabled : true };
        } catch (e) { return mod; }
      }));
      results.forEach(u => { const idx = working.findIndex(m => m.id === u.id); if (idx !== -1) working[idx] = u; });
      const isLast = i + BATCH >= listToUpdate.length;
      const newSynced = (tab === 'active' && isLast) ? targetVersion : null;
      if (tab === 'active') await saveToServer(working, null, newSynced); else await saveToServer(null, working);
      if (!isLast) await delay(DELAY);
    }
    setCheckingUpdates(false);
    addToast(`Checked ${listToUpdate.length} mods for ${targetVersion}`);
  }, [fetchModVersions, serverVersion, targetVersion, mods, wishlist, demo]);

  // --- Derived ---
  const activeDependencyIds = new Set();
  const dependencyOf = {}; // {modId: [modTitle, ...]}
  if (activeTab === 'active') mods.forEach(m => m.dependencies && m.dependencies.forEach(d => {
    if (d.dependency_type === 'required') {
      activeDependencyIds.add(d.project_id);
      if (!dependencyOf[d.project_id]) dependencyOf[d.project_id] = [];
      if (!dependencyOf[d.project_id].includes(m.title)) dependencyOf[d.project_id].push(m.title);
    }
  }));
  const activeEditingMod = editingDependencyId ? (activeTab === 'active' ? mods : wishlist).find(m => m.id === editingDependencyId) : null;
  const isSyncMismatch = activeTab === 'active' && syncedVersion && targetVersion && syncedVersion !== targetVersion;

  // expose everything to the render module via a bag
  const ctx = {
    theme, setTheme, user, view, setView, accessLevel, serverDocId, sessionCodes, serverName, serverIP, panelUrl, serverStatus, demo,
    serverVersion, targetVersion, syncedVersion, activeTab, setActiveTab, mods, wishlist,
    modInput, setModInput, loading, error, setError, checkingUpdates, showLibraries, setShowLibraries, joinCode, setJoinCode, isSyncing,
    showScriptModal, setShowScriptModal, editingDependencyId, setEditingDependencyId, showCustomModal, setShowCustomModal, showSettingsModal, setShowSettingsModal,
    searchResults, showDropdown, setShowDropdown, filterQuery, setFilterQuery, showAddMod, setShowAddMod,
    fabricLoaderVersion, setFabricLoaderVersion, fabricApiVersion, setFabricApiVersion,
    showMigrationModal, setShowMigrationModal,
    vmApiUrl, vmApiKey, installStatus, vmDiskFiles, showUpgradePanel, setShowUpgradePanel, showActionsMenu, setShowActionsMenu,
    showVmSyncModal, setShowVmSyncModal, vmSyncData, vmSyncLoading,
    removeConfirmTarget, setRemoveConfirmTarget,
    installConfirmTarget, setInstallConfirmTarget,
    addModConfirmTarget, setAddModConfirmTarget,
    sortBy, setSortBy, filter, setFilter, toasts, addToast,
    newServerName, setNewServerName, newServerIP, setNewServerIP, fileInputRef, importStatus,
    heroNote, handleSaveHeroNote,
    attemptJoin, handleCreateServer, enterDemo, handleLogout, saveVersions, handleAddCustomMod, handleAddMod,
    handleRemoveMod, handleRemoveConfirmed, handleApproveWishlist, handleVote, handleInstallMod, handleRemoveFromVM, handleVmSync, handleSyncVersionsFromDisk, handleSyncTagsFromModrinth, handleBatchReinstall,
    handleUpdateNote, handleToggleMod, handleVersionChange, handleSaveSettings, handleExportBackup, triggerImport, handleImportBackup, checkAllUpdates,
    activeDependencyIds, activeEditingMod, isSyncMismatch,
    dependencyOf
  };

  return renderApp(ctx);
}


ReactDOM.createRoot(document.getElementById('root')).render(<ModManager />);
</script>
